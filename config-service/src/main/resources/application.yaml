server:
  port: 8888

spring:
  application:
    name: config-service
  profiles:
    active: default
  cloud:
    config:
      server:
        git:
          uri: https://github.com/PedroScheurer/microservices-atitus.git
          search-paths: configs
          clone-on-start: true
        native:
          search-locations: classpath:/configs/{application}